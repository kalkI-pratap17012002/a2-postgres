services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: a2
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d a2"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Stretch (W4 preview): uncomment to run Redis alongside the stack and
  # exercise GET /health/redis.
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redisdata:/data

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Inside the compose network the db is reachable at hostname "db",
      # not "localhost" -- this overrides whatever .env has for local
      # (non-docker) development.
      DATABASE_URL: postgresql://postgres:postgres@db:5432/a2
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  # redisdata:
